name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      # Version comes from package.json `packageManager` (pnpm@9.12.0); do not also
      # set it here — pnpm/action-setup@v4 errors on a double-specified version.
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test # core + pro + mcp unit tests (Vitest)
      - run: pnpm --filter devkit-for-strapi build
